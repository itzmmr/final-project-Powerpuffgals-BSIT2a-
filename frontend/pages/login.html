<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NEXUSWrites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-hero { min-height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #2D5BFF 100%); }
        .login-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 20px; box-shadow: 0 20px 60px rgba(45,91,255,0.3); }
        .nw-emblem-login { font-family: 'Dancing Script', cursive; font-size: 3rem; background: linear-gradient(135deg, #2D5BFF, #0E7490); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-login { background: linear-gradient(135deg, #2D5BFF, #0E7490) !important; border: none !important; border-radius: 12px; }
    </style>
</head>
<body class="login-hero d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="card login-card p-4 p-lg-5">
                    <div class="text-center mb-5">
                        <div class="nw-emblem-login mb-3">NEXUS<span style="color: #2D5BFF; font-weight: 700; font-family: 'Inter', sans-serif;">Writes</span></div>
                        <h2 class="fw-bold text-dark mb-1">Welcome Back</h2>
                        <p class="text-muted">Log in to start writing amazing tutorials</p>
                    </div>
                    
                    <form id="loginForm">
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-dark">Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-muted"></i></span>
                                <input type="email" class="form-control border-0 ps-0 shadow-none" id="loginEmail" placeholder="your@email.com" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-dark">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" class="form-control border-0 ps-0 shadow-none" id="loginPassword" placeholder="••••••••" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-login w-100 fw-semibold py-3 mb-3">
                            <span class="login-text"><i class="fas fa-sign-in-alt me-2"></i>Log In</span>
                            <span class="login-spinner d-none">
                                <i class="fas fa-spinner fa-spin me-2"></i>Logging in...
                            </span>
                        </button>
                    </form>
                    
                    <div class="text-center">
                        <p class="mb-0 text-muted">Don't have an account? <a href="#" class="text-primary fw-semibold" id="showRegister">Sign up</a></p>
                    </div>
                    
                    <div class="text-center mt-4">
                        <a href="index.html" class="btn btn-outline-primary w-100">
                            <i class="fas fa-arrow-left me-2"></i>Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const loginText = submitBtn.querySelector('.login-text');
            const loginSpinner = submitBtn.querySelector('.login-spinner');
            
            // Show loading
            loginText.classList.add('d-none');
            loginSpinner.classList.remove('d-none');
            
            // Simulate login (2 seconds)
            setTimeout(() => {
                // Save login state
                localStorage.setItem('nexusUser', JSON.stringify({
                    email: email,
                    username: email.split('@')[0],
                    loggedIn: true
                }));
                
                // Go back to homepage
                window.location.href = 'dashboard.html';
            }, 2000);
        });
        
        document.getElementById('showRegister').addEventListener('click', function(e) {
            e.preventDefault();
            alert('🔥 Registration coming soon! Use any email/password for demo.');
        });
    </script>
</body>
</html>
