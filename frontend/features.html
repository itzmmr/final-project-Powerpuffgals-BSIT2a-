<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Following - NEXUSWrites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="styles/following.css">
</head>
<body>
    
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid px-lg-5">
            <a class="navbar-brand d-flex align-items-center fw-bold" href="dashboard.html" style="text-decoration: none;">
                <div class="logo-box me-2"></div>
                <span class="nexus-brand">NEXUS</span><span class="writes-brand">Writes</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <div class="dropdown">
                    <button class="btn text-white p-0 position-relative" data-bs-toggle="dropdown">
                        <i class="fas fa-bell fs-4"></i>
                        <span id="nav-notification-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" 
                              style="display:none; font-size: 0.6rem;">0</span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end shadow p-3 rounded-4" style="width: 300px;">
                        <h6 class="fw-bold">Notifications</h6>
                        <hr>
                        <div id="dropdown-notification-list">
                            <p class="small text-muted text-center">No new notifications.</p>
                       </div>
                </div>
            </div>
           <div class="nav-item">
    <a class="nav-link d-flex align-items-center text-white" href="profile.html">
        <i class="fas fa-user-circle fs-3 me-2"></i>
        <span id="navUsername" class="fw-semibold d-none d-md-inline">User</span>
    </a>
</div>
        </div>
    </div>
</nav>

    <div class="container-fluid px-lg-5 flex-grow-1">
        <div class="row">
            <div class="col-lg-3">
                <aside class="sidebar-left">
                    <div class="search-wrapper mb-4 d-flex align-items-center">
    <a href="homesearch.html" style="text-decoration: none; display: flex; width: 100%; align-items: center; color: inherit;">
        <i class="fas fa-search text-muted me-2"></i>
        <input type="search" class="form-control border-0 shadow-none p-0 bg-transparent" id="sidebarSearchInput" autocomplete="one-time-code" placeholder="Search tutorials..." readonly style="cursor: pointer;">
    </a>
</div>
                    <a href="dashboard.html" class="fb-icon-item"><i class="fas fa-home"></i><span>Home</span></a>
                    <a href="following.html" class="fb-icon-item active-link"><i class="fas fa-user-check"></i><span>Following</span></a>
                    <a href="github.html" class="fb-icon-item"><i class="fab fa-github"></i><span>GitHub</span></a>
                    <a href="settings.html" class="fb-icon-item"><i class="fas fa-sliders-h"></i><span>Settings</span></a>
                              
                    <div class="flex-grow-5"></div>

        <a href="javascript:void(0)" class="fb-icon-item mt-auto" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
        <span data-key="logout">Logout</span>
    </a>
         </aside>
            </div>

           <div class="col-lg-9 py-5">
    <div class="content-header text-center mb-4">
        <div id="pageIcon" class="placeholder-icon mb-3"></div>
        <h2 class="fw-bold mb-1" id="pageTitle"></h2> 
        <p class="text-muted fs-5">Stay updated with posts from the community members you follow.</p>
    </div>

    <div id="postsContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading feed...</span>
            </div>
        </div>
    </div>

    <div class="text-center mt-5">
        <button class="btn btn-nexus" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-home me-2"></i> Return to Feed
        </button>
    </div>
</div>
    <footer class="text-center text-white">
        <div class="container">
            <span class="nexus-brand">NEXUS</span><span class="writes-brand">Writes</span>
            <p class="small opacity-50 mt-2 mb-0">© 2026 NEXUSWrites. Your Tech. Your Story.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
     <script src="js/following.js"></script>
     <script src="js/settings.js"></script>
<script>
    // This forces the page to translate itself using the saved language in localStorage
    document.addEventListener('DOMContentLoaded', () => {
        const savedLang = localStorage.getItem('nexusLang') || 'English';
        if (typeof changeLanguage === 'function') {
            changeLanguage(savedLang);
        }
    });
</script>
</body>
</html>
