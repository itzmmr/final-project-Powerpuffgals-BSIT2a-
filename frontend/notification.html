<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | NexusWrites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold" style="color: var(--nexus-teal);">
            <i class="fas fa-bell me-2"></i> Notifications
        </h4>
        <button class="btn btn-sm btn-outline-secondary rounded-pill" onclick="markAllAsRead()">
            <i class="fas fa-check-double me-1"></i> Mark all as read
        </button>
    </div>

    <div id="notification-list" class="list-group shadow-sm rounded-3">
        <div class="text-center p-5">
            <div class="spinner-border text-info" role="status"></div>
            <p class="mt-2 text-muted">Fetching your updates...</p>
        </div>
    </div>
</div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
     <script src="js/app.js"></script>
</body>
</html>
