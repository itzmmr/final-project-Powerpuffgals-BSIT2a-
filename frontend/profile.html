<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - NEXUSWrites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/profile.css">
</head>
<body id="mainBody">

    <header class="profile-header">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left me-2"></i>Back to Feed</a>
        <div class="container text-center text-md-start">
            <div class="row align-items-center">
                <div class="col-md-3">
                    <img src="" class="rounded-circle profile-avatar mb-3" id="profileAvatar" alt="Profile">
                </div>
                <div class="col-md-6 text-white">
                    <h1 class="fw-bold mb-1" id="profileUsername" style="font-family: 'Montserrat';">Loading...</h1>
                    <p class="lead mb-2" id="profileRoleDisplay">Professional Role</p>
                    <p class="mb-3 fs-6" id="profileBioDisplay">Bio loading...</p>
                    <div class="small opacity-75"><i class="fas fa-calendar-alt me-2"></i>Joined April 2026</div>
                </div>
               
                <div id="followActionContainer" class="mt-2" style="display: none;">
                    <div class="profile-actions-wrapper">
    <div class="d-flex align-items-center gap-2">
    <div class="d-flex align-items-center gap-2">
    <button id="editProfileBtn" class="btn btn-outline-light rounded-pill px-4 fw-bold hidden-element">
        <i class="fas fa-edit me-1"></i> Edit Profile
    </button>

   

    <button id="followBtn" 
            class="btn btn-primary btn-sm ms-2 fw-bold hidden-element" 
            onclick="handleFollowActionFromProfile()">
        <i class="fas fa-user-plus me-1"></i> Follow
    </button>
</div>
</div>
    <i class="fas fa-user-plus me-1"></i> Follow
</button>
        <i class="fas fa-user-plus me-2"></i>Follow
    </button>
</div>
                    <div class="mt-3">
                        <span class="nexus-brand">NEXUS</span><span class="writes-brand">Writes</span>
                    </div>
                </div>
            </div>
        </div>
    </header>


    <div class="row g-4 mb-8 justify-content-center">
        <div class="col-md-4">
            <div class="stats-card text-center">
                <div class="stats-number" id="followingCount">0</div>
                <div class="fw-bold text-muted text-uppercase small">Following</div>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="stats-card text-center">
                <div class="stats-number" id="followersCount">0</div>
                <div class="fw-bold text-muted text-uppercase small">Followers</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stats-card text-center">
                <div class="stats-number" id="postsCount">0</div>
                <div class="fw-bold text-muted text-uppercase small">Tutorials Published</div>
            </div>
        </div>
    </div>


    <div class="content-card mt-5 p-0 border-0 bg-transparent">
    <h4 class="fw-bold technical-header-align">
        <i class="fab fa-github me-2"></i>Technical Portfolio
    </h4>
    <div id="github-portfolio-display">
        </div>
</div>

<div class="container p-0 mt-5">
    <div class="mb-4">
        <h4 class="fw-bold technical-header-align" style="color: #1a535c;">
            My Technical Posts
        </h4>
    </div>
    <div id="profileContentContainer">
        </div>
</div>

    <footer class="nexus-footer-simple">
        <div class="container text-center">
            <div class="footer-brand mb-1">
                <span class="nexus-brand">NEXUS</span><span class="writes-brand">Writes</span>
            </div>
            <p class="footer-copyright-simple mb-0">© 2026 NEXUSWrites. Your Tech. Your Story.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/settings.js"></script>
<script>
    // This forces the page to translate itself using the saved language in localStorage
    document.addEventListener('DOMContentLoaded', () => {
        const savedLang = localStorage.getItem('nexusLang') || 'English';
        if (typeof changeLanguage === 'function') {
            changeLanguage(savedLang);
        }
    });
</script>
</body>
</html>
